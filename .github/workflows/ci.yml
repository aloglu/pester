name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu,aarch64-apple-darwin
          components: rustfmt,clippy

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check Linux
        run: cargo check

      - name: Check Windows target
        run: cargo check --target x86_64-pc-windows-gnu

      - name: Check macOS target
        run: cargo check --target aarch64-apple-darwin

      - name: Shell syntax
        run: |
          sh -n install.sh
          sh -n scripts/package-macos.sh

      - name: Installer platform selection
        run: |
          test "$(PESTER_INSTALL_DRY_RUN=1 PESTER_INSTALL_OS=Linux PESTER_INSTALL_ARCH=x86_64 sh install.sh)" = "pester-linux-x86_64.tar.gz"
          test "$(PESTER_INSTALL_DRY_RUN=1 PESTER_INSTALL_OS=Linux PESTER_INSTALL_ARCH=amd64 sh install.sh)" = "pester-linux-x86_64.tar.gz"
          test "$(PESTER_INSTALL_DRY_RUN=1 PESTER_INSTALL_OS=Linux PESTER_INSTALL_ARCH=aarch64 sh install.sh)" = "pester-linux-aarch64.tar.gz"
          test "$(PESTER_INSTALL_DRY_RUN=1 PESTER_INSTALL_OS=Darwin PESTER_INSTALL_ARCH=arm64 sh install.sh)" = "pester-macos-aarch64.tar.gz"
          if PESTER_INSTALL_DRY_RUN=1 PESTER_INSTALL_OS=Darwin PESTER_INSTALL_ARCH=x86_64 sh install.sh >/tmp/pester-install.out 2>&1; then
            cat /tmp/pester-install.out
            exit 1
          fi
          grep "Intel macOS is not supported yet" /tmp/pester-install.out

  powershell:
    name: windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Parse install.ps1
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw install.ps1)) | Out-Null

      - name: Installer platform selection
        shell: pwsh
        run: |
          $env:PESTER_INSTALL_DRY_RUN = "1"
          $env:PESTER_INSTALL_OS = "Windows"

          $env:PESTER_INSTALL_ARCH = "X64"
          $X64 = & ./install.ps1
          if ($X64 -ne "pester-windows-x86_64.zip") {
              throw "Expected pester-windows-x86_64.zip, got $X64"
          }

          $env:PESTER_INSTALL_ARCH = "Arm64"
          $Arm64 = & ./install.ps1
          if ($Arm64 -ne "pester-windows-aarch64.zip") {
              throw "Expected pester-windows-aarch64.zip, got $Arm64"
          }

      - name: Check Windows MSVC
        run: cargo check
